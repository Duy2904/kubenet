apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app
  namespace: argocd
spec:
  project: default

  source:
    path: demo-app
    repoURL: 'https://github.com/Duy2904/Devops.git'
    targetRevision: HEAD
  destination:
    name: ''
    namespace: demo-app
    server: 'https://kubernetes.default.svc'

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true